<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f4f7f4" stroke="#2d8c2d" stroke-width="4"/>
  
  <!-- Car body -->
  <g transform="translate(100, 100)">
    <!-- Main car body -->
    <path d="M -45 -5 L -55 5 L -55 15 L 55 15 L 55 5 L 45 -5 Z" fill="#2d8c2d" stroke="#1e6e1e" stroke-width="2"/>
    
    <!-- Car top -->
    <rect x="-35" y="-20" width="70" height="15" rx="4" fill="#4a9e4a" stroke="#1e6e1e" stroke-width="2"/>
    
    <!-- Windows -->
    <rect x="-30" y="-18" width="20" height="12" fill="rgba(26, 86, 160, 0.3)" stroke="#1e6e1e" stroke-width="1"/>
    <rect x="10" y="-18" width="20" height="12" fill="rgba(26, 86, 160, 0.3)" stroke="#1e6e1e" stroke-width="1"/>
    
    <!-- Left wheel -->
    <circle cx="-30" cy="20" r="12" fill="#1e6e1e"/>
    <circle cx="-30" cy="20" r="8" fill="#4a9e4a" stroke="#1e6e1e" stroke-width="1"/>
    
    <!-- Right wheel -->
    <circle cx="30" cy="20" r="12" fill="#1e6e1e"/>
    <circle cx="30" cy="20" r="8" fill="#4a9e4a" stroke="#1e6e1e" stroke-width="1"/>
    
    <!-- Headlight left -->
    <circle cx="-50" cy="8" r="4" fill="rgba(251, 191, 36, 0.8)"/>
    
    <!-- Headlight right -->
    <circle cx="50" cy="8" r="4" fill="rgba(251, 191, 36, 0.8)"/>
  </g>
</svg>
